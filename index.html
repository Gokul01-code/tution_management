<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduVault — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <section id="login-screen" class="screen active">
    <div class="login-card glass-card">
      <div class="login-brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4L36 12V28L20 36L4 28V12L20 4Z" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M20 4L20 36M4 12L36 28M36 12L4 28" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
            <circle cx="20" cy="20" r="5" fill="currentColor" opacity="0.8"/>
          </svg>
        </div>
        <span class="brand-name">EduVault</span>
      </div>

      <h1 class="login-heading">Welcome Back</h1>
      <p class="login-sub">Sign in to access your tuition dashboard</p>

      <div id="login-error" class="alert alert-error" role="alert" hidden>
        <span class="alert-icon">⚠</span>
        <span id="login-error-msg">Invalid credentials. Please try again.</span>
      </div>

      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 1114 0H3z"/></svg>
          </span>
          <input type="text" id="username" class="form-input" placeholder="Enter your name" autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clip-rule="evenodd"/></svg>
          </span>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">
            <svg id="pw-eye" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
          </button>
        </div>
      </div>

      <button id="login-btn" class="btn btn-primary btn-full" type="button">
        <span>Sign In</span>
        <svg viewBox="0 0 20 20" fill="currentColor" class="btn-arrow"><path fill-rule="evenodd" d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z" clip-rule="evenodd"/></svg>
      </button>

      <p class="login-hint">Demo: use any teacher name + password <code>teach123</code></p>
    </div>
  </section>

  <!-- Toast (for login errors feedback) -->
  <div id="toast" class="toast" role="alert" aria-live="polite" hidden>
    <span id="toast-icon">✓</span>
    <span id="toast-msg"></span>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, skip to dashboard
      if (getCurrentUser()) { window.location.href = 'dashboard.html'; return; }

      const loginBtn = $('#login-btn');
      const togglePw = $('#toggle-pw');
      const pwInput  = $('#password');
      const errorEl  = $('#login-error');
      const errorMsg = $('#login-error-msg');

      togglePw.addEventListener('click', () => {
        pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
      });

      ['#username', '#password'].forEach(sel => {
        $(sel).addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
      });

      loginBtn.addEventListener('click', attemptLogin);

      function attemptLogin() {
        const username = $('#username').value.trim().toLowerCase();
        const password = $('#password').value;
        hide(errorEl);

        if (!username || !password) {
          errorMsg.textContent = 'Please enter both username and password.';
          show(errorEl); return;
        }

        const cred = CREDENTIALS[username];
        if (!cred || cred.password !== password) {
          errorMsg.textContent = 'Invalid credentials. Please try again.';
          show(errorEl);
          loginBtn.style.animation = 'none';
          requestAnimationFrame(() => { loginBtn.style.animation = 'shake 0.4s ease'; });
          return;
        }

        setCurrentUser({ username, display: cred.display, role: cred.role });
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
